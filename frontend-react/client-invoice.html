<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Client Invoices – Livio Building Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C1B2E;--navy2:#162438;--navy3:#1E3350;
  --blue:#1A6BC4;--blue-l:#E8F2FC;
  --green:#2D6A0F;--green-l:#ECF5E3;
  --amber:#A86200;--amber-l:#FEF3E2;
  --red:#9B1F1F;--red-l:#FDEAEA;
  --gray-l:#F4F3EF;
  --border:#E0DDD5;--muted:#777672;--text:#1A1917;--bg:#F7F6F2;
  --sh:0 1px 8px rgba(0,0,0,.07);--sh2:0 4px 20px rgba(0,0,0,.13);
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.3px}
.tb-right{display:flex;gap:7px;align-items:center}

/* LEDGER STRIP */
.ledger-strip{background:var(--navy);padding:16px 20px;display:flex;align-items:center;gap:0;flex-wrap:wrap;position:sticky;top:52px;z-index:90;box-shadow:0 3px 12px rgba(0,0,0,.25)}
.ls-stat{flex:1;min-width:140px;padding:0 16px;border-right:1px solid rgba(255,255,255,.12)}
.ls-stat:first-child{padding-left:0}
.ls-stat:last-of-type{border-right:none}
.ls-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#8AAAC8;margin-bottom:4px}
.ls-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1}
.ls-val.green{color:#74E84A}
.ls-val.amber{color:#FFB74D}
.ls-val.red{color:#FF6B6B}
.ls-actions{display:flex;gap:7px;align-items:center;margin-left:auto;flex-wrap:wrap;padding-left:16px}

/* MAIN */
.main{padding:18px 20px;padding-bottom:60px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.2px}
.sh-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* PROJECT INFO PANEL */
.proj-panel{background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.proj-hd{background:var(--navy);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.proj-hd-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px}
.proj-hd-sub{font-size:11px;color:#8AAAC8;margin-top:1px}
.proj-grid{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px 20px}
.dc-item{min-width:0}
.dc-item-wide{grid-column:1/-1}
.dc-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dc-val{font-size:13px;font-weight:600;color:var(--text);line-height:1.45;overflow-wrap:anywhere}
.proj-ft{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--bg)}
.proj-status{font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}
.proj-status.ok{color:var(--green)}
.proj-status.warn{color:var(--amber)}

/* INVOICE CARD */
.inv-card{background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.inv-hd{background:var(--navy);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.inv-num{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.inv-hd-right{display:flex;align-items:center;gap:8px}
.inv-hd-date{font-size:11px;color:#8AAAC8}

/* INFO BOX (2 columns) */
.inv-info-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.inv-info-col{padding:12px 16px}
.inv-info-col:first-child{border-right:1px solid var(--border)}
.iic-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;font-weight:700}
.iic-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.iic-key{font-size:11px;color:var(--muted)}
.iic-val{font-size:12px;font-weight:600;color:var(--text)}
.iic-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px}
.iic-detail{font-size:11px;color:var(--muted);line-height:1.5}

/* LINE ITEMS TABLE */
.li-wrap{padding:0;overflow-x:auto}
.li-table{width:100%;border-collapse:collapse;font-size:12px}
.li-table thead tr{background:var(--blue)}
.li-table thead th{color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:8px 14px;text-align:left}
.li-table thead th:last-child{text-align:right}
.li-table td{padding:9px 14px;border-bottom:1px solid #F0EDE6;vertical-align:middle}
.li-table tr:last-child td{border-bottom:none}
.li-table tr:nth-child(even){background:#FAFAF8}
.li-table td:last-child{text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--navy)}
.li-table td:nth-child(2){text-align:center;color:var(--muted)}

/* TOTALS */
.inv-totals{padding:10px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:flex-end;gap:3px;background:var(--bg)}
.tot-row{display:flex;gap:24px;font-size:12px}
.tot-lbl{color:var(--muted);min-width:90px;text-align:right}
.tot-val{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text);min-width:90px;text-align:right}
.tot-row.grand .tot-lbl{font-weight:700;font-size:13px;color:var(--text)}
.tot-row.grand .tot-val{color:var(--navy);font-size:16px}
.tot-row.paid-row .tot-val{color:var(--green)}
.tot-row.balance-row .tot-val{color:var(--amber)}
.tot-row.balance-row.overdue .tot-val{color:var(--red)}

/* BILLING DETAIL / PAYMENT TERMS */
.inv-section{padding:12px 16px;border-top:1px solid var(--border)}
.inv-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--blue);margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--blue);display:inline-block}
.inv-section p{font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap}

/* PAYMENT HISTORY */
.pay-hist{padding:12px 16px;border-top:1px solid var(--border);background:#FCFBF8}
.pay-hist-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--green);margin-bottom:8px}
.pay-table{width:100%;border-collapse:collapse;font-size:11px}
.pay-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:5px 10px;border-bottom:1px solid var(--border);text-align:left;background:#F4F3EF}
.pay-table td{padding:7px 10px;border-bottom:1px solid #F0EDE6;vertical-align:middle}
.pay-table tr:last-child td{border-bottom:none}
.pay-table td:nth-child(2){font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--green)}

/* THANK YOU FOOTER */
.inv-footer{padding:12px 16px;border-top:2px solid var(--blue);background:var(--blue-l);text-align:center}
.inv-footer-msg{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--blue);letter-spacing:.3px}
.inv-footer-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* INVOICE ACTIONS */
.inv-actions{padding:10px 16px;border-top:1px solid var(--border);background:#fff;display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Barlow',sans-serif;transition:.13s;white-space:nowrap}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy3)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--gray-l)}
.btn-green{background:var(--green-l);color:var(--green);border:1px solid #B8DCA0}.btn-green:hover{background:#DDF2C8}
.btn-blue{background:var(--blue-l);color:var(--blue);border:1px solid #B0D0F0}.btn-blue:hover{background:#cce0f7}
.btn-amber{background:var(--amber-l);color:var(--amber);border:1px solid #F5D9A0}.btn-amber:hover{background:#FEEAD0}
.btn-red{background:var(--red-l);color:var(--red);border:1px solid #F5C0C0}.btn-red:hover{background:#FBD5D5}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:4px}
.btn-white{background:#fff;color:var(--navy);border:1px solid rgba(255,255,255,.3)}.btn-white:hover{background:rgba(255,255,255,.9)}

/* BADGE */
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.2px;text-transform:uppercase}
.b-paid{background:var(--green-l);color:var(--green)}
.b-pending{background:var(--amber-l);color:var(--amber)}
.b-overdue{background:var(--red-l);color:var(--red)}
.b-draft{background:var(--gray-l);color:var(--muted)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-ic{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:700;color:#D8D5CE;margin-bottom:12px;letter-spacing:2px}
.empty p{font-size:13px;color:var(--muted);max-width:300px;line-height:1.6}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:600px;box-shadow:var(--sh2);overflow:hidden;max-height:94vh;display:flex;flex-direction:column}
.modal-hd{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hd h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.modal-close{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:11px}
.modal-ft{padding:11px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;align-items:center}
.fi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:4px}
.fi{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 11px;font-size:13px;font-family:'Barlow',sans-serif;background:#fff;outline:none;transition:border-color .15s;color:var(--text)}
.fi:focus{border-color:var(--blue)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fi-info{background:var(--blue-l);border:1px solid #B0D0F0;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--blue);font-weight:600}
.fi-warn{background:var(--amber-l);border:1px solid #F5D9A0;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--amber)}

/* LINE ITEMS IN MODAL */
.line-tbl{width:100%;border-collapse:collapse;font-size:12px}
.line-tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg)}
.line-tbl td{padding:3px 4px;border-bottom:1px solid #F0EDE6}
.line-tbl input{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:12px;font-family:'Barlow',sans-serif;background:#fff;outline:none;width:100%;color:var(--text)}
.line-tbl input:focus{border-color:var(--blue)}
.line-total{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--navy);padding:5px 8px;white-space:nowrap}
.rm-row{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px}
.rm-row:hover{color:var(--red)}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .2s ease;max-width:340px}
.toast.success{background:#2D6A0F}
.toast.error{background:#9B1F1F}
.toast.info{background:#1A6BC4}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROOF PREVIEW */
.proof-chip{display:inline-flex;align-items:center;gap:5px;background:var(--green-l);color:var(--green);border:1px solid #B8DCA0;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none}
.proof-chip:hover{background:#DDF2C8}

@media print{.topbar,.ledger-strip,.btn,.modal-overlay,.inv-actions,.proj-ft{display:none!important}.main{padding:0!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-title">🧾 Client Invoices</div>
  <div class="tb-right">
    <button class="btn btn-navy btn-sm" onclick="openAddInvoice()">+ Add Invoice</button>
  </div>
</div>

<!-- LEDGER STRIP (rendered dynamically) -->
<div id="ledgerStrip" style="display:none"></div>

<div class="main" id="mainArea">
  <div class="empty"><div class="empty-ic">INV</div><p>Loading project…</p></div>
</div>

<div id="toast-container"></div>

<!-- ---------------------------------- MODALS ---------------------------------- -->

<!-- EDIT CLIENT INFO MODAL -->
<div class="modal-overlay" id="editClientModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-hd"><h3>👤 Edit Client Info</h3><button class="modal-close" onclick="closeModal('editClientModal')">✕</button></div>
    <div class="modal-body">
      <div><label class="fi-lbl">Full Name / Company *</label><input class="fi" type="text" id="ec-name" placeholder="e.g. John Doe / ABC Corp"></div>
      <div class="fi-row">
        <div><label class="fi-lbl">Phone</label><input class="fi" type="tel" id="ec-phone" placeholder="+1 555 000 1234"></div>
        <div><label class="fi-lbl">Email</label><input class="fi" type="email" id="ec-email" placeholder="client@example.com"></div>
      </div>
      <div><label class="fi-lbl">Address</label><input class="fi" type="text" id="ec-addr" placeholder="123 Main St, City, State"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('editClientModal')">Cancel</button>
      <button class="btn btn-navy" onclick="saveClientInfo()">Save →</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT INVOICE MODAL -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-hd"><h3 id="inv-modal-title">🧾 New Invoice</h3><button class="modal-close" onclick="closeModal('invoiceModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="inv-id">
      <div class="fi-info" id="inv-project-info">—</div>
      <div class="fi-row">
        <div><label class="fi-lbl">Invoice #</label><input class="fi" type="text" id="inv-num" placeholder="INV-2026-001"></div>
        <div><label class="fi-lbl">Project</label><input class="fi" type="text" id="inv-project" readonly style="background:var(--bg)"></div>
      </div>
      <div class="fi-row">
        <div><label class="fi-lbl">Invoice Date</label><input class="fi" type="date" id="inv-date"></div>
        <div><label class="fi-lbl">Due Date</label><input class="fi" type="date" id="inv-due"></div>
      </div>
      <div class="fi-row">
        <div>
          <label class="fi-lbl">Status</label>
          <select class="fi" id="inv-status">
            <option value="draft">Draft</option>
            <option value="pending">Pending</option>
            <option value="paid">Paid</option>
            <option value="overdue">Overdue</option>
          </select>
        </div>
        <div><label class="fi-lbl">Tax (%)</label><input class="fi" type="number" id="inv-tax" value="0" min="0" max="100" step="0.1" oninput="updateModalTotals()"></div>
      </div>
      <div>
        <label class="fi-lbl">Line Items</label>
        <table class="line-tbl" style="margin-bottom:4px">
          <thead><tr><th style="width:42%">Description</th><th style="width:10%">Qty</th><th style="width:19%">Unit Price ($)</th><th style="width:17%">Total</th><th style="width:12%"></th></tr></thead>
          <tbody id="lineBody"></tbody>
        </table>
        <button type="button" onclick="addLine()" style="margin-top:4px;background:transparent;border:1.5px dashed var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;cursor:pointer" onmouseover="this.style.borderColor='#1A6BC4';this.style.color='#1A6BC4'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">+ Add Row</button>
        <div id="modalTotals" style="margin-top:8px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;font-size:12px"></div>
      </div>
      <div><label class="fi-lbl">Billing Detail / Notes</label><textarea class="fi" id="inv-notes" rows="2" placeholder="Bank name, account, routing, or any billing notes…"></textarea></div>
      <div><label class="fi-lbl">Payment Terms</label><textarea class="fi" id="inv-terms" rows="2" placeholder="e.g. Net 30, due on receipt, 50% upfront…"></textarea></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('invoiceModal')">Cancel</button>
      <button class="btn btn-navy" onclick="saveInvoice()">Save Invoice &rarr;</button>
    </div>
  </div>
</div>

<!-- ADD PAYMENT MODAL -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-hd"><h3>💵 Record Payment</h3><button class="modal-close" onclick="closeModal('paymentModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="pay-inv-id">
      <div class="fi-info" id="pay-inv-info">—</div>
      <div class="fi-row">
        <div><label class="fi-lbl">Payment Date *</label><input class="fi" type="date" id="pay-date"></div>
        <div><label class="fi-lbl">Amount Received ($) *</label><input class="fi" type="number" id="pay-amount" placeholder="0.00" min="0.01" step="0.01"></div>
      </div>
      <div><label class="fi-lbl">Reference / Note</label><input class="fi" type="text" id="pay-note" placeholder="Check #1234, Wire Ref, Cash, etc."></div>
      <div>
        <label class="fi-lbl">Payment Proof / Attachment <span style="color:var(--muted);font-weight:400;text-transform:none">(image or PDF)</span></label>
        <input type="file" class="fi" id="pay-proof" accept="image/*,.pdf" onchange="handleProofFile(this)">
        <div id="pay-proof-preview" style="margin-top:6px"></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('paymentModal')">Cancel</button>
      <button class="btn btn-green" onclick="savePayment()">💾 Save Payment</button>
    </div>
  </div>
</div>

<!-- SEND INVOICE EMAIL MODAL -->
<div class="modal-overlay" id="emailModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-hd"><h3 id="em-modal-title">✉ Send Invoice by Email</h3><button class="modal-close" onclick="closeModal('emailModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="em-type">
      <input type="hidden" id="em-ref-id">
      <div><label class="fi-lbl">Recipient Email</label><input class="fi" type="email" id="em-to" placeholder="client@example.com"></div>
      <div><label class="fi-lbl">Subject</label><input class="fi" type="text" id="em-subject"></div>
      <div><label class="fi-lbl">Message</label><textarea class="fi" id="em-body" rows="12" style="font-size:11px;font-family:monospace;line-height:1.5"></textarea></div>
      <div id="em-status" style="font-size:11px;color:var(--muted)"></div>
    </div>
    <div class="modal-ft">

<script>
const LIVIO_KEY='livio_v1';
function getHostApp(){
  try{
    if(window.parent && window.parent!==window && window.parent.DB && typeof window.parent.saveDB==='function'){
      return window.parent;
    }
  }catch{}
  return null;
}
function readLocalLivioDB(){
  try{return JSON.parse(localStorage.getItem(LIVIO_KEY)||'{}')}catch{return{}}
}
function getLivioDB(){
  const host=getHostApp();
  return host?.DB || readLocalLivioDB();
}
function persistLivioDB(db){
  const host=getHostApp();
  if(host?.DB){
    try{
      host.saveDB();
      return;
    }catch(err){
      console.error('client invoice shared save failed:',err);
    }
  }
  localStorage.setItem(LIVIO_KEY,JSON.stringify(db));
}
function readInvoices(){
  const projects=(getLivioDB().projects)||[];
  const hasProjectInvoices=projects.some(p=>Array.isArray(p.clientInvoices));
  if(hasProjectInvoices){
    return projects.flatMap(p=>(p.clientInvoices||[]).map(inv=>({
      ...inv,
      projectId:inv.projectId||p.id,
      project:inv.project||p.name||''
    })));
  }
  try{
    return JSON.parse(localStorage.getItem('dt_invoices')||'[]');
  }catch{
    return [];
  }
}
let invoices=readInvoices();
let curProjectId=null;
let lineItems=[];
let editInvId=null;
let payProofName='';
let payProofData='';
let lastInvoiceSig='';

/* -- HELPERS ----------------------------------------------- */
function getAllProjects(){return getLivioDB().projects||[]}
function getProj(){return getAllProjects().find(x=>x.id===curProjectId)||null}
function saveInvoices(){
  const db=getLivioDB();
  const projects=db.projects||[];
  if(projects.length){
    projects.forEach(p=>{
      p.clientInvoices=invoices
        .filter(inv=>inv.projectId===p.id)
        .map(inv=>({...inv,projectId:p.id,project:inv.project||p.name||''}));
    });
    persistLivioDB(db);
    lastInvoiceSig=JSON.stringify(invoices);
    return;
  }
  localStorage.setItem('dt_invoices',JSON.stringify(invoices));
  lastInvoiceSig=JSON.stringify(invoices);
}
function uid(){return Math.random().toString(36).slice(2,10)}
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
const fmtD=s=>s?new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'
const fmtM=n=>(n!=null&&n!=='')?'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'$0.00'
const LIVIO_COMPANY_NAME='Livio Building Systems'
const LIVIO_OFFICE_ADDRESS='121 Main St #563, Los Altos, California (CA) 94022'
const LIVIO_REPLY_EMAIL='ap@golivio.com'
function getProjectAddress(p){return p?.address||p?.clientAddr||'—'}
function getLivioSignature(){return `${LIVIO_COMPANY_NAME}\n${LIVIO_OFFICE_ADDRESS}\nReply Email: ${LIVIO_REPLY_EMAIL}`}
function invPaid(inv){return(inv.payments||[]).reduce((s,p)=>s+(parseFloat(p.amount)||0),0)}
function invBalance(inv){return(inv.total||0)-invPaid(inv)}
function statusBadge(s){const m={paid:'b-paid',pending:'b-pending',overdue:'b-overdue',draft:'b-draft'};return`<span class="badge ${m[s]||'b-draft'}">${s}</span>`}
function loadActiveProject(){const db=getLivioDB();curProjectId=db.activeId||(db.projects&&db.projects[0]?.id)||null}

/* -- TOAST ------------------------------------------------- */
function showToast(msg,type='info',dur=3500){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},dur);
}

/* -- EMAIL DELIVERY ---------------------------------------- */
function getEmailConfig(){return {}}
function getEmailApiBase(){
  const host=getHostApp();
  try{
    const hostApi=(host&&typeof host.getApiBase==='function')?host.getApiBase():(host&&host.__LIVIO_API_BASE)||'';
    if(hostApi) return String(hostApi).replace(/\/+$/,'');
  }catch{}
  const isLocal=location.hostname==='127.0.0.1'||location.hostname==='localhost';
  const fallback=isLocal
    ? 'http://127.0.0.1:3001/api'
    : 'https://project-managment-production-7373.up.railway.app/api';
  return fallback.replace(/\/+$/,'');
}
function getEmailStatusHtml(){
  const apiBase=getEmailApiBase();
  return `<span style="color:var(--green)">✓ Using backend email service</span><br><span style="font-size:10px;color:var(--muted)">API: ${apiBase}</span>`;
}
function renderEmailSendStatus(){
  const el=document.getElementById('em-status');
  if(el)el.innerHTML=getEmailStatusHtml();
}
async function sendEmailThroughBackend(to,subject,message,attachments){
  const payload={
    to,
    subject,
    message,
    fromName:'Livio Building Systems',
    replyTo:LIVIO_REPLY_EMAIL
  };
  if(Array.isArray(attachments)&&attachments.length) payload.attachments=attachments;
  const res=await fetch(getEmailApiBase()+'/email/send',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||data.message||('Email send failed ('+res.status+')'));
  return data;
}

/* -- INVOICE MODAL ----------------------------------------- */
function openAddInvoice(){
  editInvId=null;
  lineItems=[{desc:'',qty:1,price:0}];
  document.getElementById('inv-modal-title').textContent='🧾 New Invoice';
  document.getElementById('inv-id').value='';

function openEditInvoice(id){

  editInvId=id;

  document.getElementById('inv-id').value=inv.id;
  const p=getProj();
  document.getElementById('inv-num').value=inv.num||'';
  document.getElementById('inv-project').value=inv.project||p?.name||'';

function addLine(){lineItems.push({desc:'',qty:1,price:0});renderLineItems()}
function removeLine(i){lineItems.splice(i,1);if(!lineItems.length)lineItems=[{desc:'',qty:1,price:0}];renderLineItems()}
function renderLineItems(){
  const tb=document.getElementById('lineBody');
  tb.innerHTML=lineItems.map((l,i)=>`<tr>
    <td><input value="${esc(l.desc)}" placeholder="Description" oninput="lineItems[${i}].desc=this.value"></td>
    <td><input type="number" value="${l.qty||1}" min="1" style="width:60px" oninput="lineItems[${i}].qty=parseFloat(this.value)||1;updateModalTotals()"></td>
    <td><input type="number" value="${l.price||0}" min="0" step="0.01" oninput="lineItems[${i}].price=parseFloat(this.value)||0;updateModalTotals()"></td>
    <td class="line-total">${fmtM((l.qty||1)*(l.price||0))}</td>
    <td><button type="button" class="rm-row" onclick="removeLine(${i})">✕</button></td>
  </tr>`).join('');
  updateModalTotals();
}
function updateModalTotals(){
  // Update line totals in DOM
  const rows=document.getElementById('lineBody').rows;
  let sub=0;
  lineItems.forEach((l,i)=>{
    const t=(l.qty||1)*(l.price||0);
    if(rows[i])rows[i].cells[3].textContent=fmtM(t);
    sub+=t;
  });
  const tax=parseFloat(document.getElementById('inv-tax').value)||0;
  const taxAmt=sub*tax/100;
  const total=sub+taxAmt;
  const el=document.getElementById('modalTotals');
  el.innerHTML=`
    <div style="display:flex;gap:20px;font-size:12px"><span style="color:var(--muted)">Subtotal:</span><strong>${fmtM(sub)}</strong></div>
    ${tax?`<div style="display:flex;gap:20px;font-size:12px"><span style="color:var(--muted)">Tax (${tax}%):</span><strong>${fmtM(taxAmt)}</strong></div>`:''}
    <div style="display:flex;gap:20px;font-size:13px;margin-top:4px"><span style="font-weight:700">Total:</span><strong style="color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-size:16px">${fmtM(total)}</strong></div>`;
}

function saveInvoice(){
  const p=getProj();
  if(!p){showToast('No active project.','error');return;}
  const num=document.getElementById('inv-num').value.trim();
  if(!num){showToast('Invoice # is required.','error');return;}
  // Validate line items
  if(!lineItems.length||!lineItems.some(l=>l.desc.trim())){showToast('Add at least one line item with a description.','error');return;}
  const sub=lineItems.reduce((s,l)=>s+(l.qty||1)*(l.price||0),0);
  const tax=parseFloat(document.getElementById('inv-tax').value)||0;
  const taxAmt=sub*tax/100;
  const total=sub+taxAmt;
  const data={
    id:editInvId||('inv_'+uid()),
    projectId:p.id,
    num,
    project:p.name,
    date:document.getElementById('inv-date').value,
    due:document.getElementById('inv-due').value,
    status:document.getElementById('inv-status').value,
    tax,
    lines:lineItems.map(l=>({desc:l.desc,qty:l.qty||1,price:l.price||0})),
    subtotal:sub,
    total,
    notes:document.getElementById('inv-notes').value.trim(),
    paymentTerms:document.getElementById('inv-terms').value.trim(),
    payments:[]
  };
  if(editInvId){
    const idx=invoices.findIndex(x=>x.id===editInvId);
    if(idx>=0){data.payments=invoices[idx].payments||[];invoices[idx]=data;}
    showToast('? Invoice updated.','success');
  } else {
    invoices.push(data);
    showToast('? Invoice created!','success');
  }
  saveInvoices();
  closeModal('invoiceModal');
  renderMain();
}

function deleteInvoice(id){
  if(!confirm('Delete this invoice and all its payment records?'))return;
  invoices=invoices.filter(x=>x.id!==id);
  saveInvoices();
  showToast('Invoice deleted.','info');
  renderMain();
}

function handleProofFile(input){
  payProofName='';payProofData='';
  document.getElementById('pay-proof-preview').innerHTML='';
  const file=input.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){showToast('File too large (max 5 MB).','error');input.value='';return;}
  payProofName=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    payProofData=e.target.result;
    document.getElementById('pay-proof-preview').innerHTML=`<span style="font-size:11px;color:var(--green);font-weight:600">? ${esc(file.name)} (${(file.size/1024).toFixed(1)} KB)</span>`;
  };
  reader.readAsDataURL(file);
}

function savePayment(){
  const invId=document.getElementById('pay-inv-id').value;
  const date=document.getElementById('pay-date').value;
  const amount=parseFloat(document.getElementById('pay-amount').value);
  const note=document.getElementById('pay-note').value.trim();
  if(!date){showToast('Payment date is required.','error');return;}
  if(!amount||amount<=0){showToast('Enter a valid payment amount.','error');return;}
  const idx=invoices.findIndex(x=>x.id===invId);
  if(idx<0){showToast('Invoice not found.','error');return;}
  if(!invoices[idx].payments)invoices[idx].payments=[];
  const pay={id:'pay_'+uid(),date,amount,note,proofName:payProofName,proofData:payProofData};
  invoices[idx].payments.push(pay);
  // Auto-update status if fully paid
  const paid=invPaid(invoices[idx]);
  if(paid>=invoices[idx].total-0.01&&invoices[idx].status!=='paid'){
    invoices[idx].status='paid';
    showToast('? Payment recorded. Invoice marked as PAID!','success',4500);
  } else {
    showToast('? Payment of '+fmtM(amount)+' recorded!','success');
  }
  saveInvoices();
  closeModal('paymentModal');
  renderMain();
}

function deletePayment(invId,payId){
  if(!confirm('Delete this payment record?'))return;
  const idx=invoices.findIndex(x=>x.id===invId);
  if(idx<0)return;
  invoices[idx].payments=(invoices[idx].payments||[]).filter(p=>p.id!==payId);
  saveInvoices();
  showToast('Payment record deleted.','info');
  renderMain();
}

function viewProof(invId,payId){
  const inv=invoices.find(x=>x.id===invId);
  if(!inv)return;
  const pay=(inv.payments||[]).find(p=>p.id===payId);
  if(!pay||!pay.proofData){showToast('No proof file attached.','error');return;}
  const win=window.open();
  win.document.write(`<html><head><title>${pay.proofName||'Proof'}</title></head><body style="margin:0;background:#222;display:flex;justify-content:center">
    ${pay.proofData.startsWith('data:image')?`<img src="${pay.proofData}" style="max-width:100%;height:auto">`:`<iframe src="${pay.proofData}" style="width:100vw;height:100vh;border:none"></iframe>`}
  </body></html>`);
}

/* -- GENERATE INVOICE PDF ---------------------------------- */
function buildInvoicePDFDoc(invId){
  const inv=invoices.find(x=>x.id===invId);
  if(!inv) throw new Error('Invoice not found.');
  const p=getProj();
  if(!window.jspdf) throw new Error('PDF library not loaded yet. Try again.');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'letter'});
  const W=doc.internal.pageSize.getWidth();
  const H=doc.internal.pageSize.getHeight();
  const ML=40,MR=40;
  const CW=W-ML-MR;

  // -- Blue header bar
  doc.setFillColor(26,107,196);
  doc.rect(0,0,W,72,'F');

  // Company name
  doc.setFont('helvetica','bold');
  doc.setFontSize(20);
  doc.setTextColor(255,255,255);
  doc.text('LIVIO BUILDING SYSTEMS',ML,36);

  // Company tagline / address
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(200,225,255);
  doc.text(`Licensed General Contractor  ·  ${LIVIO_OFFICE_ADDRESS}`,ML,52);

  // "INVOICE" right-aligned
  doc.setFont('helvetica','bold');
  doc.setFontSize(26);
  doc.setTextColor(255,255,255);
  doc.text('INVOICE',W-MR,46,{align:'right'});

  let y=90;

  // -- Two-column info box
  const boxH=88;
  const boxMid=ML+CW/2;
  doc.setDrawColor(210,210,210);
  doc.setLineWidth(0.5);
  doc.rect(ML,y,CW,boxH,'S');
  doc.line(boxMid,y,boxMid,y+boxH);

  // Left column: Invoice details
  const lx=ML+12;
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setTextColor(130,130,130);
  doc.text('INVOICE #',lx,y+18);
  doc.text('ISSUE DATE',lx,y+36);
  doc.text('DUE DATE',lx,y+54);
  doc.text('STATUS',lx,y+72);

  doc.setFont('helvetica','normal');
  doc.setFontSize(9.5);
  doc.setTextColor(25,25,25);
  const valX=boxMid-16;
  doc.text(inv.num||'—',valX,y+18,{align:'right'});
  doc.text(fmtD(inv.date),valX,y+36,{align:'right'});
  doc.text(fmtD(inv.due),valX,y+54,{align:'right'});
  doc.setFont('helvetica','bold');
  doc.text((inv.status||'pending').toUpperCase(),valX,y+72,{align:'right'});

  // Right column: Bill To
  const rx=boxMid+12;
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setTextColor(130,130,130);
  doc.text('BILL TO',rx,y+18);

  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(12,27,46);
  doc.text(p?.client||'Client Name',rx,y+33);

  doc.setFont('helvetica','normal');
  doc.setFontSize(8.5);
  doc.setTextColor(80,80,80);
  let billY=y+46;
  if(p?.clientAddr){doc.text(p.clientAddr,rx,billY);billY+=13;}
  if(p?.clientPhone){doc.text(p.clientPhone,rx,billY);billY+=13;}
  if(p?.clientEmail){doc.text(p.clientEmail,rx,billY);}

  y+=boxH+16;

  // -- Line items table
  const heads=[['Description','Qty','Unit Price','Amount']];
  const rows=(inv.lines||[]).map(l=>[
    l.desc||'',
    String(l.qty||1),
    fmtM(l.price),
    fmtM((l.qty||1)*(l.price||0))
  ]);

  doc.autoTable({
    startY:y,
    head:heads,
    body:rows,
    margin:{left:ML,right:MR},
    headStyles:{fillColor:[26,107,196],textColor:[255,255,255],fontStyle:'bold',fontSize:9,cellPadding:8},
    bodyStyles:{fontSize:9,textColor:[40,40,40],cellPadding:7},
    columnStyles:{
      0:{cellWidth:'auto'},
      1:{cellWidth:50,halign:'center'},
      2:{cellWidth:80,halign:'right'},
      3:{cellWidth:80,halign:'right',fontStyle:'bold'}
    },
    alternateRowStyles:{fillColor:[248,247,244]},
    tableLineColor:[220,217,213],tableLineWidth:0.3
  });

  y=doc.lastAutoTable.finalY+8;

  // -- Totals
  const rightEdge=W-MR;
  const lblStart=W-MR-160;

  function totRow(lbl,val,bold,color){
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.setFontSize(bold?10:9);
    doc.setTextColor(...(color||[100,100,100]));
    doc.text(lbl,lblStart,y);
    doc.setTextColor(...(color||[40,40,40]));
    doc.text(val,rightEdge,y,{align:'right'});
    y+=bold?18:14;
  }

  y+=6;
  totRow('Subtotal:',fmtM(inv.subtotal));
  if(inv.tax){totRow(`Tax (${inv.tax}%):`,fmtM((inv.subtotal||0)*(inv.tax||0)/100));}

  // Total divider line
  doc.setDrawColor(26,107,196);
  doc.setLineWidth(1);
  doc.line(lblStart,y,rightEdge,y);
  y+=8;
  totRow('TOTAL:',fmtM(inv.total),true,[26,107,196]);

  // Payment summary
  const pays=inv.payments||[];
  if(pays.length){
    const totalPaid=pays.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
    const bal=(inv.total||0)-totalPaid;
    totRow('Amount Paid:',fmtM(totalPaid),false,[45,106,15]);
    doc.setDrawColor(200,200,200);
    doc.setLineWidth(0.5);
    doc.line(lblStart,y,rightEdge,y);
    y+=8;
    totRow('BALANCE DUE:',fmtM(bal),true,bal>0.01?[168,98,0]:[45,106,15]);
  }

  y+=10;

  // -- Billing Detail
  if(inv.notes){
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(26,107,196);
    doc.text('Billing Detail',ML,y);
    doc.setDrawColor(26,107,196);
    doc.setLineWidth(1.2);
    doc.line(ML,y+4,W-MR,y+4);
    y+=18;
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(70,70,70);
    const noteLines=doc.splitTextToSize(inv.notes,CW);
    doc.text(noteLines,ML,y);
    y+=noteLines.length*13+12;
  }

  // -- Payment Terms
  if(inv.paymentTerms){
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(26,107,196);
    doc.text('Payment Terms',ML,y);
    doc.setDrawColor(26,107,196);
    doc.setLineWidth(1.2);
    doc.line(ML,y+4,W-MR,y+4);
    y+=18;
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(70,70,70);
    const ptLines=doc.splitTextToSize(inv.paymentTerms,CW);
    doc.text(ptLines,ML,y);
    y+=ptLines.length*13+12;
  }

  // -- Payment History (if any)
  if(pays.length){
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(26,107,196);
    doc.text('Payment History',ML,y);
    doc.setDrawColor(26,107,196);
    doc.setLineWidth(1.2);
    doc.line(ML,y+4,W-MR,y+4);
    y+=6;
    doc.autoTable({
      startY:y,
      head:[['Date','Amount','Reference / Note']],
      body:pays.map(pay=>[fmtD(pay.date),fmtM(pay.amount),pay.note||'—']),
      margin:{left:ML,right:MR},
      headStyles:{fillColor:[45,106,15],textColor:[255,255,255],fontSize:8,cellPadding:6},
      bodyStyles:{fontSize:8,textColor:[50,50,50],cellPadding:6},
      columnStyles:{1:{halign:'right',fontStyle:'bold'}},
      alternateRowStyles:{fillColor:[242,248,238]}
    });
    y=doc.lastAutoTable.finalY+16;
  }

  // -- Footer
  const ftY=Math.max(y+20,H-60);
  doc.setDrawColor(26,107,196);
  doc.setLineWidth(1.5);
  doc.line(ML,ftY,W-MR,ftY);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(26,107,196);
  doc.text('Thank you for your business!',W/2,ftY+20,{align:'center'});
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(160,160,160);
  doc.text(`${LIVIO_COMPANY_NAME} · ${LIVIO_OFFICE_ADDRESS}`,W/2,ftY+35,{align:'center'});

  return { doc, inv };
}

function generateInvoicePDF(invId){
  const { doc, inv } = buildInvoicePDFDoc(invId);
  doc.save(`${inv.num||'Invoice'}.pdf`);
  showToast(`? ${inv.num}.pdf downloaded!`,'success');
}

function buildInvoicePdfAttachment(invId){
  const { doc, inv } = buildInvoicePDFDoc(invId);
  const dataUri=doc.output('datauristring');
  const content=String(dataUri).split(',')[1]||'';
  return {
    filename:`${inv.num||'Invoice'}.pdf`,
    content,
    contentType:'application/pdf'
  };
}

  let body=`Dear ${p?.client||'Client'},\n\nPlease find below your invoice details from Livio Building Systems.\n\n`;
  body+=`INVOICE: ${inv.num}\n${'-'.repeat(40)}\n`;
  body+=`Project:    ${inv.project||p?.name||'—'}\n`;
  body+=`Project Address: ${getProjectAddress(p)}\n`;
  body+=`Livio Address:   ${LIVIO_OFFICE_ADDRESS}\n`;
  body+=`Issue Date: ${fmtD(inv.date)}\n`;
  body+=`Due Date:   ${fmtD(inv.due)}\n`;
  body+=`Status:     ${(inv.status||'pending').toUpperCase()}\n\n`;
  body+=`LINE ITEMS\n${'-'.repeat(40)}\n`;
  (inv.lines||[]).forEach(l=>{body+=`${l.desc} × ${l.qty}  —  ${fmtM(l.price)} ea.  =  ${fmtM(l.qty*l.price)}\n`;});
  body+=`\nSubtotal:   ${fmtM(inv.subtotal)}\n`;
  if(inv.tax)body+=`Tax (${inv.tax}%): ${fmtM((inv.subtotal||0)*(inv.tax||0)/100)}\n`;
  body+=`TOTAL:      ${fmtM(inv.total)}\n`;
  if((inv.payments||[]).length){
    body+=`Amount Paid:${fmtM(paid)}\nBalance Due:${fmtM(bal)}\n`;
  }
  if(inv.notes)body+=`\nBilling Detail:\n${inv.notes}\n`;
  if(inv.paymentTerms)body+=`\nPayment Terms:\n${inv.paymentTerms}\n`;
  body+=`\nReply Email: ${LIVIO_REPLY_EMAIL}\n`;
  body+=`\nThank you for your business!\n${getLivioSignature()}`;

  document.getElementById('em-modal-title').textContent=`✉ Send Invoice ${inv.num}`;
  document.getElementById('em-type').value='invoice';
  document.getElementById('em-ref-id').value=invId;
  document.getElementById('em-to').value=p?.clientEmail||'';
  document.getElementById('em-subject').value=`Invoice ${inv.num} – ${p?.name||inv.project}`;
  document.getElementById('em-body').value=body;
  renderEmailSendStatus();
  document.getElementById('emailModal').classList.add('open');
}

/* -- SEND VIA BACKEND EMAIL SERVICE ------------------------ */
function sendEmailJS(){
  const to=document.getElementById('em-to').value.trim();
  const subject=document.getElementById('em-subject').value.trim();
  const body=document.getElementById('em-body').value.trim();
  const type=document.getElementById('em-type').value;
  const refId=document.getElementById('em-ref-id').value;
  if(!to||!subject||!body){showToast('Fill all fields.','error');return;}
  const btn=document.getElementById('emailSendBtn');
  btn.innerHTML='<span class="spinner"></span> Sending…';
  btn.disabled=true;
  let attachments=[];
  try{
    if(type==='invoice'&&refId){
      attachments=[buildInvoicePdfAttachment(refId)];
    }
  }catch(err){
    btn.innerHTML='✉ Send';
    btn.disabled=false;
    showToast('? Unable to attach invoice PDF: '+(err.message||err),'error',6000);
    return;
  }
  sendEmailThroughBackend(to,subject,body,attachments)
    .then(()=>{
      const message=(type==='invoice'&&refId)?'? Email sent with invoice PDF attached!':'? Email sent successfully!';
      showToast(message,'success',4500);
      closeModal('emailModal');
    })
    .catch(err=>{
      showToast('? Email send failed: '+(err.message||JSON.stringify(err)),'error',6000);
    })
    .finally(()=>{btn.innerHTML='✉ Send';btn.disabled=false;});
}

/* -- SYNC FROM PARENT (iframe) ----------------------------- */
const originalGenerateInvoicePDF = generateInvoicePDF;
generateInvoicePDF = function(invId){
  if(!window.jspdf||!window.jspdf.jsPDF){
    showToast('PDF library not loaded yet. Try again.','error');
    return;
  }
  const probe = new window.jspdf.jsPDF({unit:'pt',format:'letter'});
  if(typeof probe.autoTable !== 'function'){
    showToast('PDF tools are still loading. Please try again in a moment.','error');
    return;
  }
  try{
    originalGenerateInvoicePDF(invId);
  }catch(err){
    console.error('Invoice PDF generation failed:',err);
    showToast('Unable to generate invoice PDF right now.','error');
  }
}

function syncActiveProject(){
  loadActiveProject();
  invoices=readInvoices();
  lastInvoiceSig=JSON.stringify(invoices);
  renderMain();
}
window.syncActiveProject=syncActiveProject;

/* -- INIT -------------------------------------------------- */
syncActiveProject();

// Polling fallback
setInterval(()=>{
  const db=getLivioDB();
  const newId=db.activeId||(db.projects&&db.projects[0]?.id)||null;
  const nextInvoices=readInvoices();
  const nextSig=JSON.stringify(nextInvoices);
  if(newId!==curProjectId || nextSig!==lastInvoiceSig){
    curProjectId=newId;
    invoices=nextInvoices;
    lastInvoiceSig=nextSig;
    renderMain();
  }
},2000);
</script>
